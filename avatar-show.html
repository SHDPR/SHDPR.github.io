<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><style>
  body { background: #111; display: flex; align-items: center; justify-content: center; gap: 48px; height: 100vh; margin: 0; font-family: sans-serif; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; color: #555; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  img { border-radius: 50%; }
</style></head>
<body>
  <div class="item">
    <img src="public/avatar.svg" width="240" height="240"/>
    <span>240px · large</span>
  </div>
  <div class="item">
    <img src="public/avatar.svg" width="120" height="120"/>
    <span>120px</span>
  </div>
  <div class="item">
    <img src="public/avatar.svg" width="56" height="56"/>
    <span>56px · actual</span>
  </div>
</body>
</html>
