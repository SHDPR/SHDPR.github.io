<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circ">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>

    <!-- Cartoon filter: boost saturation + contrast -->
    <filter id="cartoon" color-interpolation-filters="sRGB" x="0%" y="0%" width="100%" height="100%">
      <feColorMatrix type="saturate" values="1.7" result="sat"/>
      <feComponentTransfer in="sat" result="contrast">
        <feFuncR type="linear" slope="1.25" intercept="-0.12"/>
        <feFuncG type="linear" slope="1.25" intercept="-0.12"/>
        <feFuncB type="linear" slope="1.15" intercept="-0.08"/>
      </feComponentTransfer>
    </filter>

    <!-- Fade bottom to white -->
    <linearGradient id="fadeOut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
      <stop offset="92%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#circ)">

    <!-- White background -->
    <rect width="100" height="100" fill="white"/>

    <!-- Dog image — zoomed in on face (scale 155/225 = 0.689 per px) -->
    <!-- Left eye ≈ pixel(85,68) → SVG(31.6, 38.9) -->
    <!-- Right eye ≈ pixel(140,68) → SVG(69.5, 38.9) -->
    <image
      href="/avatar.jpg"
      x="-27" y="-6"
      width="155" height="155"
      filter="url(#cartoon)"
      preserveAspectRatio="xMidYMid meet"
    />

    <!-- Fade body out into white at bottom -->
    <rect width="100" height="100" fill="url(#fadeOut)"/>

    <!-- ── OVERSIZED ROUND GLASSES ── -->
    <!-- Subtle lens tint -->
    <circle cx="32" cy="40" r="13" fill="#D8EEFF" fill-opacity="0.22"/>
    <circle cx="68" cy="40" r="13" fill="#D8EEFF" fill-opacity="0.22"/>

    <!-- Frames -->
    <circle cx="32" cy="40" r="13" fill="none" stroke="#1E1008" stroke-width="2.6"/>
    <circle cx="68" cy="40" r="13" fill="none" stroke="#1E1008" stroke-width="2.6"/>

    <!-- Bridge (connects the two lenses) -->
    <line x1="45" y1="40" x2="55" y2="40" stroke="#1E1008" stroke-width="2.2"/>

    <!-- Temple arms -->
    <line x1="19" y1="35" x2="7"  y2="32" stroke="#1E1008" stroke-width="2.3"/>
    <line x1="81" y1="35" x2="93" y2="32" stroke="#1E1008" stroke-width="2.3"/>

    <!-- Lens glare highlights -->
    <ellipse cx="26" cy="33" rx="3.2" ry="1.8" fill="white" opacity="0.45" transform="rotate(-35 26 33)"/>
    <ellipse cx="62" cy="33" rx="3.2" ry="1.8" fill="white" opacity="0.45" transform="rotate(-35 62 33)"/>

  </g>
</svg>
