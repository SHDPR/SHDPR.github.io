<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circle">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
    <radialGradient id="furHead" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F8C848"/>
      <stop offset="100%" stop-color="#D4901A"/>
    </radialGradient>
    <radialGradient id="furBody" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#F0BC38"/>
      <stop offset="100%" stop-color="#C88018"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#circle)">

    <!-- Background: soft white-cream -->
    <rect width="100" height="100" fill="#FEFCF8"/>
    <!-- Subtle warm shadow at bottom -->
    <ellipse cx="50" cy="100" rx="46" ry="14" fill="#F0E0B0" opacity="0.55"/>

    <!-- ── BODY ── -->
    <!-- Haunches (left & right, fill edges) -->
    <ellipse cx="20" cy="86" rx="20" ry="18" fill="#C88018"/>
    <ellipse cx="80" cy="86" rx="20" ry="18" fill="#C88018"/>
    <!-- Main torso -->
    <ellipse cx="50" cy="82" rx="28" ry="22" fill="url(#furBody)"/>
    <!-- Chest light patch -->
    <ellipse cx="50" cy="76" rx="16" ry="13" fill="#F8D860" opacity="0.75"/>
    <!-- Chest fluff wisps -->
    <ellipse cx="44" cy="72" rx="5" ry="8" fill="#FDE880" opacity="0.55" transform="rotate(-12 44 72)"/>
    <ellipse cx="50" cy="70" rx="5" ry="9" fill="#FDE880" opacity="0.55"/>
    <ellipse cx="56" cy="72" rx="5" ry="8" fill="#FDE880" opacity="0.55" transform="rotate(12 56 72)"/>

    <!-- Front left paw -->
    <ellipse cx="37" cy="95" rx="9" ry="6.5" fill="#D49020"/>
    <ellipse cx="33" cy="98" rx="5" ry="3" fill="#C07810"/>
    <ellipse cx="39" cy="99" rx="5" ry="3" fill="#C07810"/>
    <!-- Front right paw -->
    <ellipse cx="63" cy="95" rx="9" ry="6.5" fill="#D49020"/>
    <ellipse cx="59" cy="98" rx="5" ry="3" fill="#C07810"/>
    <ellipse cx="65" cy="99" rx="5" ry="3" fill="#C07810"/>

    <!-- ── EARS (behind head) ── -->
    <!-- Left ear outer -->
    <ellipse cx="22" cy="38" rx="16" ry="22" fill="#B87018" transform="rotate(12 22 38)"/>
    <!-- Left ear inner highlight -->
    <ellipse cx="23" cy="40" rx="9" ry="14" fill="#CC8C20" transform="rotate(12 23 40)"/>
    <!-- Right ear outer -->
    <ellipse cx="78" cy="38" rx="16" ry="22" fill="#B87018" transform="rotate(-12 78 38)"/>
    <!-- Right ear inner highlight -->
    <ellipse cx="77" cy="40" rx="9" ry="14" fill="#CC8C20" transform="rotate(-12 77 40)"/>

    <!-- ── HEAD ── -->
    <circle cx="50" cy="36" r="25" fill="url(#furHead)"/>

    <!-- Forehead lighter sheen -->
    <ellipse cx="50" cy="24" rx="18" ry="10" fill="#FADA60" opacity="0.55"/>

    <!-- Forehead fur wisps -->
    <path d="M41 19 Q43 13 45 19" stroke="#E8B030" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M48 17 Q50 11 52 17" stroke="#E8B030" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M55 19 Q57 13 59 19" stroke="#E8B030" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.8"/>

    <!-- ── MUZZLE ── -->
    <ellipse cx="50" cy="47" rx="14" ry="10" fill="#F8E070"/>
    <!-- Muzzle highlight -->
    <ellipse cx="46" cy="44" rx="5" ry="3" fill="#FFF0A0" opacity="0.5"/>

    <!-- ── EYES ── -->
    <!-- Left eye white -->
    <circle cx="38" cy="35" r="7" fill="white"/>
    <!-- Left iris -->
    <circle cx="38" cy="35.5" r="5.2" fill="#2A1204"/>
    <!-- Left pupil -->
    <circle cx="38" cy="35.5" r="3" fill="#120802"/>
    <!-- Left highlight main -->
    <circle cx="40.2" cy="33.2" r="1.9" fill="white" opacity="0.92"/>
    <!-- Left highlight small -->
    <circle cx="36.8" cy="37.2" r="0.9" fill="white" opacity="0.55"/>

    <!-- Right eye white -->
    <circle cx="62" cy="35" r="7" fill="white"/>
    <!-- Right iris -->
    <circle cx="62" cy="35.5" r="5.2" fill="#2A1204"/>
    <!-- Right pupil -->
    <circle cx="62" cy="35.5" r="3" fill="#120802"/>
    <!-- Right highlight main -->
    <circle cx="64.2" cy="33.2" r="1.9" fill="white" opacity="0.92"/>
    <!-- Right highlight small -->
    <circle cx="60.8" cy="37.2" r="0.9" fill="white" opacity="0.55"/>

    <!-- Eyebrow fur (subtle) -->
    <path d="M31 27 Q38 24 44 27" stroke="#A06010" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M56 27 Q62 24 69 27" stroke="#A06010" stroke-width="1.6" fill="none" stroke-linecap="round"/>

    <!-- ── OVERSIZED ROUND GLASSES ── -->
    <!-- Lens tint (very subtle blue) -->
    <circle cx="38" cy="35" r="11" fill="#D8EEFF" opacity="0.18"/>
    <circle cx="62" cy="35" r="11" fill="#D8EEFF" opacity="0.18"/>
    <!-- Frames -->
    <circle cx="38" cy="35" r="11" fill="none" stroke="#2C1A08" stroke-width="2.4"/>
    <circle cx="62" cy="35" r="11" fill="none" stroke="#2C1A08" stroke-width="2.4"/>
    <!-- Bridge -->
    <line x1="49" y1="35" x2="51" y2="35" stroke="#2C1A08" stroke-width="2"/>
    <!-- Temple arms -->
    <line x1="27" y1="31" x2="16" y2="28" stroke="#2C1A08" stroke-width="2.2"/>
    <line x1="73" y1="31" x2="84" y2="28" stroke="#2C1A08" stroke-width="2.2"/>
    <!-- Lens glare -->
    <ellipse cx="33" cy="29" rx="2.8" ry="1.5" fill="white" opacity="0.3" transform="rotate(-30 33 29)"/>
    <ellipse cx="57" cy="29" rx="2.8" ry="1.5" fill="white" opacity="0.3" transform="rotate(-30 57 29)"/>

    <!-- ── NOSE ── -->
    <ellipse cx="50" cy="44" rx="5.2" ry="3.8" fill="#1E0E04"/>
    <!-- Nose shine -->
    <ellipse cx="48.2" cy="42.8" rx="1.6" ry="1" fill="white" opacity="0.38"/>

    <!-- ── MOUTH & TONGUE ── -->
    <!-- Center line -->
    <line x1="50" y1="47.5" x2="50" y2="51" stroke="#1E0E04" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M43 51 Q50 57.5 57 51" stroke="#1E0E04" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Tongue -->
    <ellipse cx="50" cy="57" rx="5.5" ry="4.5" fill="#E06070"/>
    <ellipse cx="50" cy="58.5" rx="5.5" ry="3" fill="#D05060"/>
    <!-- Tongue center crease -->
    <line x1="50" y1="53.5" x2="50" y2="61" stroke="#C04058" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <!-- Tongue highlight -->
    <ellipse cx="47.5" cy="56" rx="1.5" ry="2" fill="#F080A0" opacity="0.5"/>

  </g>
</svg>
